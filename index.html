<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Valutaomvandlare — iPhone 16 Pro Max Preview</title>
    <style>
        body {
            background-color: #d4d4d4;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: sans-serif;
        }

        /* iPhone 16 Pro Max — Desert Titanium / orangebrons band runt skärm */
        .iphone-frame {
            position: relative;
            box-sizing: border-box;
            width: 374px;
            height: 812px;
            padding: 11px;
            border-radius: 56px;
            background: linear-gradient(
                155deg,
                #f3e3d4 0%,
                #d4a574 18%,
                #b87a48 42%,
                #9a6438 58%,
                #c9935c 82%,
                #e8c9a8 100%
            );
            box-shadow:
                inset 0 2px 5px rgba(255, 255, 255, 0.5),
                inset 0 -4px 12px rgba(60, 35, 18, 0.35),
                0 32px 64px rgba(0, 0, 0, 0.38);
        }

        .iphone-screen {
            --status-bar-h: 28px;
            position: relative;
            width: 100%;
            height: 100%;
            border-radius: 46px;
            background: #000;
            overflow: hidden;
            box-shadow:
                inset 0 0 0 2px rgba(30, 22, 16, 0.85),
                inset 0 0 0 3px rgba(255, 255, 255, 0.04);
        }

        /* Statusrad — tunnare, neutral grå */
        .status-bar {
            box-sizing: border-box;
            height: var(--status-bar-h);
            padding: 0 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #6e6e73;
            box-shadow: inset 0 -1px 0 rgba(0, 0, 0, 0.1);
            position: relative;
            z-index: 15;
        }

        .status-time {
            margin: 0;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: -0.02em;
            color: rgba(255, 255, 255, 0.92);
            line-height: 1;
        }

        .status-icons {
            display: flex;
            align-items: center;
            gap: 4px;
            height: 11px;
        }

        .cell-bars {
            display: inline-flex;
            align-items: flex-end;
            gap: 1px;
            height: 7px;
        }

        .cell-bars span {
            width: 2px;
            border-radius: 1px;
            background: rgba(255, 255, 255, 0.92);
        }

        .cell-bars span:nth-child(1) { height: 2px; opacity: 0.35; }
        .cell-bars span:nth-child(2) { height: 4px; opacity: 0.55; }
        .cell-bars span:nth-child(3) { height: 5px; opacity: 0.78; }
        .cell-bars span:nth-child(4) { height: 7px; opacity: 1; }

        .icon-wifi,
        .icon-battery {
            display: block;
            flex-shrink: 0;
        }

        /* Dynamic Island — anpassad till lägre statusrad */
        .dynamic-island {
            position: absolute;
            top: 5px;
            left: 50%;
            transform: translateX(-50%);
            width: 74px;
            height: 14px;
            background: #2c2c2e;
            border-radius: 8px;
            z-index: 20;
            box-shadow:
                inset 0 0 0 1px rgba(255, 255, 255, 0.08),
                0 1px 2px rgba(0, 0, 0, 0.15);
            pointer-events: none;
        }

        iframe {
            position: absolute;
            top: calc(var(--status-bar-h) - 1px);
            left: -1px;
            width: calc(100% + 2px);
            height: calc(100% - var(--status-bar-h) + 3px);
            border: none;
            background: #000;
            display: block;
            box-sizing: border-box;
        }

        @media (max-width: 450px) {
            body { background: #fff; }
            .iphone-frame {
                width: 100vw;
                height: 100vh;
                padding: 0;
                border-radius: 0;
                box-shadow: none;
                background: #fff;
            }
            .iphone-screen {
                border-radius: 0;
                box-shadow: none;
            }
            .iphone-screen iframe {
                top: -1px;
                height: calc(100% + 2px);
            }
            .dynamic-island,
            .status-bar { display: none; }
        }
    </style>
</head>
<body>

    <div class="iphone-frame">
        <div class="iphone-screen">
            <header class="status-bar" aria-hidden="true">
                <time class="status-time">9:41</time>
                <div class="status-icons">
                    <span class="cell-bars">
                        <span></span><span></span><span></span><span></span>
                    </span>
                    <svg class="icon-wifi" width="13" height="9" viewBox="0 0 17 12" aria-hidden="true">
                        <path fill="rgba(255,255,255,0.92)" d="M8.5 2.2c2 0 3.9.8 5.3 2.2l-1.2 1.2a6.77 6.77 0 0 0-8.2 0L3.2 4.4a7.56 7.56 0 0 1 5.3-2.2zm0 3.5c1.3 0 2.5.5 3.4 1.4l-1.2 1.2a3.72 3.72 0 0 0-4.4 0L5.1 7.1c.9-.9 2.1-1.4 3.4-1.4zm0 3.5c.7 0 1.3.3 1.8.8l-1.8 1.8-1.8-1.8c.5-.5 1.1-.8 1.8-.8z"/>
                    </svg>
                    <svg class="icon-battery" width="20" height="9" viewBox="0 0 27 13" aria-hidden="true">
                        <rect x="1" y="2.5" width="21" height="8" rx="2" stroke="rgba(255,255,255,0.45)" stroke-width="1" fill="none"/>
                        <path d="M23 5v3" stroke="rgba(255,255,255,0.45)" stroke-width="1" stroke-linecap="round"/>
                        <rect x="3" y="4.5" width="15" height="4" rx="1" fill="rgba(255,255,255,0.92)"/>
                    </svg>
                </div>
            </header>
            <div class="dynamic-island" aria-hidden="true"></div>
            <iframe
                src="https://valutaomvandlare.netlify.app/"
                title="iPhone Pro Max Preview">
            </iframe>
        </div>
    </div>

    <script>
        (function () {
            var el = document.querySelector(".status-time");
            if (!el) return;
            function pad(n) { return n < 10 ? "0" + n : String(n); }
            function tick() {
                var d = new Date();
                el.textContent = pad(d.getHours()) + ":" + pad(d.getMinutes());
                el.setAttribute("datetime", d.toISOString());
            }
            tick();
            setInterval(tick, 1000);
        })();
    </script>
</body>
</html>
