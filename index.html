<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Valutaomvandlare — iPhone 16 Pro Max Preview</title>
    <style>
        body {
            background-color: #d4d4d4;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: sans-serif;
        }

        /* iPhone 16 Pro Max — Desert Titanium / orangebrons band runt skärm */
        .iphone-frame {
            position: relative;
            box-sizing: border-box;
            width: 374px;
            height: 812px;
            padding: 11px;
            border-radius: 56px;
            background: linear-gradient(
                155deg,
                #f3e3d4 0%,
                #d4a574 18%,
                #b87a48 42%,
                #9a6438 58%,
                #c9935c 82%,
                #e8c9a8 100%
            );
            box-shadow:
                inset 0 2px 5px rgba(255, 255, 255, 0.5),
                inset 0 -4px 12px rgba(60, 35, 18, 0.35),
                0 32px 64px rgba(0, 0, 0, 0.38);
        }

        .iphone-screen {
            position: relative;
            width: 100%;
            height: 100%;
            border-radius: 46px;
            background: #000;
            overflow: hidden;
            box-shadow:
                inset 0 0 0 2px rgba(30, 22, 16, 0.85),
                inset 0 0 0 3px rgba(255, 255, 255, 0.04);
        }

        /* Dynamic Island — kompaktare än tidigare */
        .dynamic-island {
            position: absolute;
            top: 13px;
            left: 50%;
            transform: translateX(-50%);
            width: 86px;
            height: 20px;
            background: #080808;
            border-radius: 12px;
            z-index: 20;
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.05);
        }

        iframe {
            position: absolute;
            /* Lite överskan täcker subpixel-glapp (tunn linje längst ner / vid kanter) */
            top: -1px;
            left: -1px;
            width: calc(100% + 2px);
            height: calc(100% + 2px);
            border: none;
            background: #000;
            display: block;
            box-sizing: border-box;
        }

        @media (max-width: 450px) {
            body { background: #fff; }
            .iphone-frame {
                width: 100vw;
                height: 100vh;
                padding: 0;
                border-radius: 0;
                box-shadow: none;
                background: #fff;
            }
            .iphone-screen {
                border-radius: 0;
                box-shadow: none;
            }
            .dynamic-island { display: none; }
        }
    </style>
</head>
<body>

    <div class="iphone-frame">
        <div class="iphone-screen">
            <div class="dynamic-island" aria-hidden="true"></div>
            <iframe
                src="https://valutaomvandlare.netlify.app/"
                title="iPhone Pro Max Preview">
            </iframe>
        </div>
    </div>

</body>
</html>
